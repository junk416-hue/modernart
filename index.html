<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#EDE6D6">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<meta http-equiv="Expires" content="0">
<title>AUTOMAT</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='10' width='80' height='80' rx='8' fill='%23EDE6D6' stroke='%23151210' stroke-width='8'/%3E%3Cpath d='M50 22 L58 42 L78 50 L58 58 L50 78 L42 58 L22 50 L42 42 Z' fill='%231E9E5A' stroke='%23151210' stroke-width='4' stroke-linejoin='round'/%3E%3Cpath d='M75 75 Q75 83 79 83 Q83 83 83 75 Q83 68 79 61 Q75 68 75 75 Z' fill='%23DE342B'/%3E%3C/svg%3E">
<style>
  html,body{margin:0;padding:0;height:100%;background:#EDE6D6;overflow:hidden;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
    touch-action:none;overscroll-behavior:none;}
  #c{display:block;width:100vw;height:100vh;touch-action:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";
(function(){
/* ---------- palette ---------- */
var PAPER="#EDE6D6", INK="#151210", RED="#DE342B", BLUE="#2049C0", YEL="#F1C40F", GRN="#1E9E5A", WHITE="#FFFFFF", GOLD="#CE9A2C", MONEYGRN="#1E9E5A";
var ORANGE="#E67E22", PURPLE="#9B59B6", PINK="#E91E63", TEAL="#008080", PEACH="#FFCBA4", FOREST="#228B22";
var REDUCED = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
var PI2=Math.PI*2;

/* ---------- catalogs / economy ---------- */
var SHAPE_KINDS = (function() { var a = ['dot','tri','sq','ring','half','cross']; for(var si=6;si<90;si++) a.push('s'+si); return a; })();
var COLOR_LIST=[RED,BLUE,YEL,GRN,INK,WHITE,ORANGE,PURPLE,PINK,TEAL,PEACH,FOREST];
var NOTE={}; NOTE[RED]=329.6;NOTE[BLUE]=196.0;NOTE[YEL]=493.9;NOTE[INK]=146.8;NOTE[GRN]=293.7;NOTE[WHITE]=587.3;NOTE[GOLD]=392.0;
NOTE[ORANGE]=220.0;NOTE[PURPLE]=246.9;NOTE[PINK]=277.2;NOTE[TEAL]=311.1;NOTE[PEACH]=622.3;NOTE[FOREST]=987.8;

var MONEY_FLOOR=100;     // canvas reserve: player must always keep this
var BLOOD_MAX=100, BLOOD_COST=5, BLOOD_REGEN=7, BLOOD_LOW=28;   // red paint = blood; empty = death
var AUTO_BASE=30, AUTO_GROW=1.7, AUTO_CAP=24;                    // auto-paint buyers
var START_MONEY=0;       // start broke — bootstrap with free red paint
var DROP_COST=5;         // non-red paint drop
var GALLERY_COST=500;    // auto-sell upgrade
var BASE_SALE=8;
var SHAPE_THRESHOLDS = (function() {
  var a = [0];
  for (var i = 1; i < 90; i++) {
    a.push(a[i - 1] + 1 + Math.floor(i / 15));
  }
  return a;
})();

var PATTERNS = (function() {
  var a = ['stripes', 'circles', 'wavy', 'vertical', 'grid', 'checkered', 'dots', 'radial', 'zigzag', 'trans_stripes', 'trans_circles', 'trans_wavy', 'trans_dots', 'trans_radial', 'trans_vertical', 'grad_linear', 'grad_radial', 'grad_conic', 'grad_stripes', 'grad_waves', 'grad_rings', 'grad_vertical', 'grad_diagonal', 'grad_glow', 'grad_rainbow'];
  for(var pi=25; pi<55; pi++) a.push('p'+pi);
  return a;
})();
var PATTERN_THRESHOLDS = (function() {
  var a = [0];
  for (var i = 1; i < 55; i++) {
    a.push(a[i - 1] + 2 + Math.floor(i / 5));
  }
  return a;
})(); // skill threshold to unlock shape at index
/* ---------- title screen ---------- */
var TITLE=true;
var GLYPHS={
 'M':["101","111","101","101","101"], 'O':["111","101","101","101","111"],
 'D':["110","101","101","101","110"], 'E':["111","100","111","100","111"],
 'R':["110","101","110","101","101"], 'N':["101","111","111","111","101"],
 'A':["111","101","111","101","101"], 'T':["111","010","010","010","010"], ' ':["000","000","000","000","000"]
};
var TKINDS=['dot','tri','sq','half','cross','ring'], TCOLS=[RED,BLUE,YEL,GRN];
function buildTitleDecor(word){ var out=[]; for(var li=0;li<word.length;li++){ var g=GLYPHS[word[li]]||GLYPHS[' '], cells=[];
  for(var r=0;r<5;r++)for(var c=0;c<3;c++){ if(g[r].charAt(c)==='1') cells.push({r:r,c:c,
    kind:TKINDS[(Math.random()*TKINDS.length)|0], col:TCOLS[(Math.random()*TCOLS.length)|0],
    rot:(Math.random()-0.5)*0.9, jx:(Math.random()-0.5)*0.22, jy:(Math.random()-0.5)*0.22, scl:0.7+Math.random()*0.4}); }
  out.push({bg:(Math.random()<0.5?'gray':'white'), cells:cells}); } return out; }
var TITLE_L1=buildTitleDecor("MODERN"), TITLE_L2=buildTitleDecor("ART");

/* ---------- canvas / DPR ---------- */
var cv=document.getElementById("c"), ctx=cv.getContext("2d");
var W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  cv.style.width=W+"px"; cv.style.height=H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  layout(); makeGrain();
}
window.addEventListener("resize",resize);

/* ---------- state ---------- */
var S;
function mkGrid(){ var a=[]; for(var r=0;r<5;r++)for(var c=0;c<4;c++)a.push([c,r]); return a; }
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){var j=(Math.random()*(i+1))|0;var t=a[i];a[i]=a[j];a[j]=t;} return a; }
function freshState(){
  var st={
    money:START_MONEY, fame:0, artMult:1, artTimer:3,
    unlocked:1, shapeOrder:shuffle(SHAPE_KINDS), cur:null, galleryOwned:false,
    paintSpend:0, sellCd:0,
    blood:BLOOD_MAX, auto:{}, autoT:{}, dead:false, deadT:0, selColor:RED,
    moneyScale:1000, iconVal:10,
    art:[], order:shuffle(mkGrid()), flyers:[],
    gallery:[], coins:[], glints:[],
    warn:null, taught:false, mute:false, view:'main',
    skill:0, autoDisabled:{}, galleryDisabled:false,
    bgMix:null, bgPattern:null, unlockedPatterns:1,
    colorsUsed:[RED], usedSecondColor:false,
    autoPickShape:false, autoPickShapeEnabled:false,
    autoPickPattern:false, autoPickPatternEnabled:false
  };
  st.cur={stripes:[], n:0, target:5+((Math.random()*6)|0), kind:st.shapeOrder[0], flash:0, pattern:'stripes'};
  return st;
}

/* ---------- persistence ---------- */
var SAVE_KEY='modernart.save.v1';
// The gallery (sold-painting thumbnails) is deliberately NOT persisted: its
// <img> data-URLs are heavy and it's just a cosmetic history. Everything else
// in S is plain JSON data.
function serializeState(){
  var snap={};
  for(var k in S){ if(k==='gallery'||k==='__proto__') continue; snap[k]=S[k]; }
  return snap;
}
function saveGame(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(serializeState())); }catch(e){}
}
function loadGame(){
  var raw; try{ raw=localStorage.getItem(SAVE_KEY); }catch(e){ return null; }
  if(!raw) return null;
  var data; try{ data=JSON.parse(raw); }catch(e){ return null; }
  if(!data || typeof data.money!=='number') return null;
  var st=freshState();                       // defaults, so fields added since the save still exist
  for(var k in data){ if(k==='gallery'||k==='__proto__') continue; st[k]=data[k]; }
  st.gallery=[];                             // gallery always starts empty (never saved)
  return st;
}
var clearArm=0;   // seconds left in the "tap again to confirm" window on the trash button
var saveDirty=false, saveClock=0;   // coalesce frequent saves (auto-sell can fire several times a second)
function requestSave(){ saveDirty=true; }
function clearSave(armed){
  if(armed){ clearArm=0; try{ localStorage.removeItem(SAVE_KEY); }catch(e){} S=freshState(); tone(140,0.3,"sawtooth",0.5); }
  else { clearArm=3; tone(200,0.14,"square",0.4); }          // first tap only arms it
}

/* ---------- derived ---------- */
function fameMult(){ return 1 + S.fame*0.3; }
function requiredShapes(){ return Math.max(5, 10 - S.fame); }             // hidden mechanic, floor of 5
function curShapes(){ return S.art.length + S.flyers.length; }
function sellable(){ return curShapes() >= requiredShapes(); }
function canPaint(){ return curShapes() < requiredShapes(); }
function canSpend(cost){ return (S.money - cost) >= MONEY_FLOOR; }        // always keep the $100 reserve
function variety(){ var s={},n=0; for(var i=0;i<S.art.length;i++){ s[S.art[i].mix[0].col]=1; } for(var k in s) n++; return n; }

/* ---------- placement ---------- */
function pickPlace(){
  var base=Math.min(L.frame.w/4,L.frame.h/5);
  var s=base*(0.18+Math.random()*1.15);
  var fx=L.frame.x + s + Math.random()*(L.frame.w - 2*s);
  var fy=L.frame.y + s + Math.random()*(L.frame.h - 2*s);
  return {x:fx,y:fy,s:s};
}
function commitArt(f){ S.art.push({k:f.kind,x:f.tx,y:f.ty,mix:f.mix,s:f.s,rot:f.rot,t:0,pattern:f.pattern,border:f.border}); spawnGlint(f.tx,f.ty,f.mix[0].col); }

/* ---------- actions ---------- */
function warn(x,y){ S.warn={x:x,y:y,t:0}; tone(120,0.16,"sawtooth",0.35); }
function die(){ S.dead=true; S.deadT=0; if(AC&&!S.mute){ tone(90,0.6,"sawtooth",0.5); tone(60,0.9,"sine",0.4); } }
function autoCost(hex){ return Math.round(AUTO_BASE*Math.pow(AUTO_GROW,S.auto[hex]||0)); }
function buyAutoColor(hex,x,y){ var c=autoCost(hex); if(!canSpend(c)){ warn(x,y); return; } S.money-=c; S.auto[hex]=(S.auto[hex]||0)+1; chord(NOTE[hex]); }
function randKind(){ return S.shapeOrder[(Math.random()*S.unlocked)|0]; }
function resetCur(){
  var limit = S.unlockedPatterns || 1;
  var k = (S.cur && !S.autoPickShapeEnabled) ? S.cur.kind : randKind();
  var pat = (S.cur && !S.autoPickPatternEnabled) ? S.cur.pattern : PATTERNS[(Math.random() * limit) | 0];
  S.cur={stripes:[], n:0, target:5+((Math.random()*6)|0), kind:k, flash:0, pattern:pat};
}
function depositCurrent(){
  var st=S.cur.stripes, tot=0,i; for(i=0;i<st.length;i++) tot+=st[i].amt;
  if(tot>0){
    var mix=st.map(function(s){ return {col:s.col, share:s.amt/tot}; });
    var pl=pickPlace();
    var hasBorder = Math.random() < 0.5;
    S.flyers.push({x:L.well.cx,y:L.well.cy,tx:pl.x,ty:pl.y,t:0,kind:S.cur.kind,mix:mix,s:pl.s,rot:Math.random()*PI2,pattern:S.cur.pattern,border:hasBorder});
    chord(NOTE[st[st.length-1].col]||NOTE[RED]);
    S.skill = (S.skill || 0) + 1;
    while(S.unlocked < 90 && S.skill >= SHAPE_THRESHOLDS[S.unlocked]){
      S.unlocked++;
      var slot = L.shapeSlots[S.unlocked-1];
      if(slot) spawnGlint(slot.x + slot.w/2, slot.y + slot.h/2, GOLD);
      chord(NOTE[BLUE]);
    }
    while(S.unlockedPatterns < 55 && S.skill >= PATTERN_THRESHOLDS[S.unlockedPatterns]){
      if(!S.usedSecondColor) break;
      S.unlockedPatterns++;
      chord(NOTE[YEL]);
      spawnGlint(L.well.cx, L.well.cy, GOLD);
    }
  }
  resetCur();
}
function paintDrop(hex,sx,sy,auto){
  if(hex===RED){
    S.blood-=BLOOD_COST;
    if(S.blood<=0){ S.blood=0; die(); return; }             // the drop that empties the blood kills you
  } else {
    if(!canSpend(DROP_COST)){ if(!auto) warn(sx,sy); return; } // never dip under the reserve
    S.money-=DROP_COST; S.paintSpend+=DROP_COST;
  }
  if(!auto) S.selColor=hex;
  if(S.colorsUsed && S.colorsUsed.indexOf(hex) === -1){
    S.colorsUsed.push(hex);
    if(S.colorsUsed.length >= 2){
      S.usedSecondColor = true;
    }
  }
  var st=S.cur.stripes;                                       // add a stripe to the shape being built
  if(st.length && st[st.length-1].col===hex) st[st.length-1].amt++;
  else st.push({col:hex,amt:1});
  S.cur.n++; S.cur.flash=1;
  if(S.art.length === 0 && S.flyers.length === 0){
    if(hex !== RED){
      var bgStripes = S.cur.stripes.filter(function(s){ return s.col !== RED; });
      var bgTot = 0;
      for(var i=0; i<bgStripes.length; i++) bgTot += bgStripes[i].amt;
      if(bgTot > 0){
        S.bgMix = bgStripes.map(function(s){ return {col:s.col, share:s.amt/bgTot}; });
        S.bgPattern = S.cur.pattern;
      }
    }
  }
  tone(NOTE[hex]*(1+Math.random()*0.02),0.14,"sine",0.4);
  S.taught=true;
  if(S.cur.n>=S.cur.target) depositCurrent();                 // 5-10 drops complete a striped shape
}
function doSell(){
  if(!sellable()) return;
  // thumbnail
  var tw=140, th=Math.round(tw*L.frame.h/L.frame.w);
  var oc=document.createElement("canvas"); oc.width=tw; oc.height=th;
  var g=oc.getContext("2d");
  if(S.bgMix && S.bgMix.length > 0){
    var sx=tw/L.frame.w, sy=th/L.frame.h;
    g.save(); g.scale(sx,sy); g.translate(-L.frame.x,-L.frame.y);
    var f=L.frame;
    g.save(); g.beginPath(); g.rect(f.x,f.y,f.w,f.h); g.clip();
    var cx=f.x+f.w/2, cy=f.y+f.h/2, r=Math.max(f.w,f.h)*0.9;
    bandFill(g,cx,cy,r,S.bgMix,1.0,S.bgPattern);
    g.restore();
    for(var i=0;i<S.art.length;i++){ var e=S.art[i]; var tt=e.t; e.t=1; drawArt(g,e); e.t=tt; }
    g.restore();
  } else {
    g.fillStyle="#F6F1E6"; g.fillRect(0,0,tw,th);
    var sx=tw/L.frame.w, sy=th/L.frame.h;
    g.save(); g.scale(sx,sy); g.translate(-L.frame.x,-L.frame.y);
    for(var i=0;i<S.art.length;i++){ var e=S.art[i]; var tt=e.t; e.t=1; drawArt(g,e); e.t=tt; }
    g.restore();
  }
  var img=new Image(); img.src=oc.toDataURL();
  var v=Math.max(1,variety());
  var price=BASE_SALE*(1+0.5*(v-1))*S.artMult*fameMult()*(0.9+Math.random()*0.2);
  var pips=Math.max(1,Math.min(9,Math.round(price/6)));
  var nc=Math.max(5,Math.min(26,Math.round(price/3)));
  // less effort (cheaper paint) => more fame
  var fg = S.paintSpend<=0?3 : (S.paintSpend<=6?2:1);
  S.money+=price; S.fame+=fg;
  S.gallery.push({img:img,val:pips}); if(S.gallery.length>60) S.gallery.shift();
  for(var k=0;k<nc;k++) S.coins.push({x:L.frame.x+Math.random()*L.frame.w, y:L.frame.y+Math.random()*L.frame.h, tx:L.hud.x+16, ty:L.hud.y+8, t:-Math.random()*0.25});
  chord(NOTE[GRN]); setTimeout(function(){chord(NOTE[YEL]*1.5);},110);
  // fresh canvas
  S.art=[]; S.flyers=[]; S.order=shuffle(mkGrid()); S.paintSpend=0; S.sellCd = (S.galleryOwned && !S.galleryDisabled) ? 0.02 : 1.2; resetCur();
  S.bgMix=null; S.bgPattern=null;
  requestSave();                                               // autosave after each sale (coalesced, see update)
}
// Shapes unlock automatically as skill increases
function buyGallery(){ if(S.galleryOwned) return;
  if(!canSpend(GALLERY_COST)){ warn(L.gallery.cx,L.gallery.cy); return; }
  S.money-=GALLERY_COST; S.galleryOwned=true; chord(NOTE[YEL]); }

/* ---------- shapes ---------- */
function buildKindPath(g,kind,cx,cy,r){
  g.beginPath();
  if(kind==='dot'){ g.arc(cx,cy,r*0.62,0,PI2); }
  else if(kind==='ring'){ g.arc(cx,cy,r*0.78,0,PI2); g.arc(cx,cy,r*0.44,0,PI2); }
  else if(kind==='tri'){ g.moveTo(cx,cy-r*0.95); g.lineTo(cx+r*0.9,cy+r*0.72); g.lineTo(cx-r*0.9,cy+r*0.72); g.closePath(); }
  else if(kind==='sq'){ g.rect(cx-r*0.8,cy-r*0.8,r*1.6,r*1.6); }
  else if(kind==='half'){ g.arc(cx,cy+r*0.4,r*0.95,Math.PI,PI2); g.closePath(); }
  else if(kind==='cross'){ var t=r*0.32; g.rect(cx-t,cy-r,2*t,2*r); g.rect(cx-r,cy-t,2*r,2*t); }
  else if(kind.charAt(0)==='s'){
    var idx = parseInt(kind.substring(1), 10);
    if(idx === 10 || idx === 25 || idx === 40) {
      var angle = (idx === 10 ? 0 : (idx === 25 ? 1 : 2)) * Math.PI / 4;
      var thickness = r * 0.08;
      g.save();
      g.translate(cx, cy);
      g.rotate(angle);
      g.rect(-r * 0.95, -thickness / 2, r * 1.9, thickness);
      g.restore();
    } else {
      function seededRand(s) {
        var x = Math.sin(s) * 10000;
        return x - Math.floor(x);
      }
      var s1 = seededRand(idx * 7 + 1);
      var s2 = seededRand(idx * 7 + 2);
      var s3 = seededRand(idx * 7 + 3);
      var s4 = seededRand(idx * 7 + 4);
      var s5 = seededRand(idx * 7 + 5);
      var s6 = seededRand(idx * 7 + 6);
      
      var f1 = 2 + Math.floor(s1 * 3);
      var f2 = 5 + Math.floor(s2 * 3);
      
      var amp1 = 0.12 + s3 * 0.18;
      var amp2 = 0.05 + s4 * 0.10;
      
      var phase1 = s5 * PI2;
      var phase2 = s6 * PI2;
      
      var squish = 0.75 + seededRand(idx * 7 + 7) * 0.25;
      
      var steps = 100;
      for (var step = 0; step <= steps; step++) {
        var theta = (step / steps) * PI2;
        var rMult = 1.0;
        rMult += amp1 * Math.sin(f1 * theta + phase1);
        rMult += amp2 * Math.cos(f2 * theta + phase2);
        
        rMult = Math.max(0.2, Math.min(1.4, rMult * 0.55));
        var curR = r * rMult;
        var px = cx + Math.cos(theta) * curR;
        var py = cy + Math.sin(theta) * curR * squish;
        
        if (step === 0) g.moveTo(px, py);
        else g.lineTo(px, py);
      }
      g.closePath();
    }
  }
}
function fillKind(kind,cx,cy,r,col){ ctx.save(); buildKindPath(ctx,kind,cx,cy,r); ctx.fillStyle=col; ctx.fill(kind==='ring'?'evenodd':'nonzero'); ctx.restore(); }
function drawKindFilled(g,kind,cx,cy,r,mix,rot,pattern,border){
  g.save(); if(rot){ g.translate(cx,cy); g.rotate(rot); g.translate(-cx,-cy); }
  buildKindPath(g,kind,cx,cy,r); g.clip(kind==='ring'?'evenodd':'nonzero');
  if(rot){ g.translate(cx,cy); g.rotate(-rot); g.translate(-cx,-cy); }
  bandFill(g,cx,cy,r,mix,1.0,pattern);
  g.restore();
  if(border !== false){
    g.save(); if(rot){ g.translate(cx,cy); g.rotate(rot); g.translate(-cx,-cy); }
    buildKindPath(g,kind,cx,cy,r); g.strokeStyle="rgba(21,18,16,0.18)"; g.lineWidth=Math.max(1,r*0.035); g.stroke(); g.restore();
  }
}
function drawArt(g,e){ var pop=e.t<1?(1-Math.pow(1-e.t,3)):1; drawKindFilled(g,e.k,e.x,e.y,e.s*pop,e.mix,e.rot,e.pattern,e.border); }

var L={};
function layout(){
  var m = Math.max(12, W * 0.035);
  var iconR = Math.max(10, W * 0.03);
  L.icon = iconR;
  var gutter = Math.max(24, W * 0.075);
  var left = m + gutter;
  var rowW = W - m - left;
  
  L.thermo = {x: m * 0.55, y: m, w: gutter * 0.8, h: H - 2 * m};

  var yCursor = m;
  
  var hudH = Math.max(60, H * 0.1);
  L.hudCard = {x: left, y: yCursor, w: rowW, h: hudH};
  L.hud = {x: left + m * 0.8, y: yCursor + m * 0.4};
  L.mute = {cx: W - m - iconR - m*0.4, cy: yCursor + hudH / 2, r: iconR};
  L.gallery = {cx: L.mute.cx - iconR * 2.5, cy: L.mute.cy, r: iconR};
  L.galleryView = {cx: L.gallery.cx - iconR * 2.5, cy: L.mute.cy, r: iconR};
  
  L.well = {cx: left + rowW * 0.51, cy: yCursor + hudH / 2, r: Math.min(iconR * 1.5, hudH * 0.33)};
  L.sell = {cx: L.well.cx + L.well.r + iconR * 1.8, cy: L.well.cy, r: L.well.r * 0.85};
  
  yCursor += hudH + m * 0.4;
  
  var frameH = Math.max(90, Math.min(H * 0.32, (H - yCursor) * 0.42));
  L.canvasCard = {x: left, y: yCursor, w: rowW, h: frameH};
  L.frame = {x: left + 6, y: yCursor + 6, w: rowW - 12, h: frameH - 12};
  
  yCursor += frameH + m * 0.4;
  
  var cg = m * 0.25;
  var cbw = (rowW - m * 1.2 - cg * 5) / 6;
  var rh = Math.max(18, H * 0.038);
  
  var firstRowColors = [BLUE, YEL, GRN, INK, WHITE];
  var firstRowUnlocked = true;
  for(var fi=0; fi<firstRowColors.length; fi++){
    if(!S.auto[firstRowColors[fi]] || S.auto[firstRowColors[fi]] < 1){
      firstRowUnlocked = false;
    }
  }
  
  var paletteH = (rh + m * 0.4) * (firstRowUnlocked ? 2 : 1) + m * 0.4;
  L.paletteCard = {x: left, y: yCursor, w: rowW, h: paletteH};
  
  L.colors = [];
  L.autos = [];
  var limit = firstRowUnlocked ? 12 : 6;
  for(var i=0; i<limit; i++){

    L.autos.push({x: colx + cbw - rh, y: yColor, w: rh, h: rh, hex: COLOR_LIST[i]});
  }
  
  yCursor += paletteH + m * 0.4;
  
  var selectorH = H - m - yCursor;
  L.selectorCard = {x: left, y: yCursor, w: rowW, h: selectorH};

  L.clear = {cx: W - m - iconR, cy: H - m - iconR, r: iconR};   // trash lives in the bottom-right corner
  
  var titleH = 20;
  var gridTop = yCursor + titleH + 4;
  var gridAvailH = selectorH - titleH - 8;
  
  var btnSize = Math.max(12, Math.min(22, gridAvailH / 10.5));
  var btnGap = Math.max(2, btnSize * 0.15);
  
  var shapeGridW = rowW * 0.64;
  var shapeCols = Math.floor((shapeGridW - m) / (btnSize + btnGap)) || 1;
  L.shapeCols = shapeCols;
  
  L.shapeAutoPick = {x: left + shapeGridW - 42, y: yCursor + 2, w: 38, h: 16};
  
  var patGridX = left + shapeGridW + m * 0.2;
  var patGridW = rowW - shapeGridW - m * 0.2;
  var patCols = Math.floor((patGridW - m) / (btnSize + btnGap)) || 1;
  L.patCols = patCols;
  
  L.patAutoPick = {x: left + rowW - 42, y: yCursor + 2, w: 38, h: 16};
  
  L.shapeSlots = [];
  for(var i=0;i<90;i++){
    var col = i % shapeCols;
    var row = Math.floor(i / shapeCols);
    var bx = left + m * 0.4 + col * (btnSize + btnGap);
    var by = gridTop + row * (btnSize + btnGap);
    L.shapeSlots.push({x: bx, y: by, w: btnSize, h: btnSize});
  }

  L.patternSlots = [];
  for(var i=0;i<55;i++){
    var col = i % patCols;
    var row = Math.floor(i / patCols);
    var bx = patGridX + col * (btnSize + btnGap);
    var by = gridTop + row * (btnSize + btnGap);
    L.patternSlots.push({x: bx, y: by, w: btnSize, h: btnSize});

  var gm = m, cols = 3, ggap = gm * 0.6;

}

function tone(freq,dur,type,g){ if(!AC||S.mute) return; var o=AC.createOscillator(),gn=AC.createGain(); o.type=type||"sine"; o.frequency.value=freq;
  var t=AC.currentTime; gn.gain.setValueAtTime(0.0001,t); gn.gain.exponentialRampToValueAtTime(g||0.6,t+0.012); gn.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.28));

function onDown(x,y){
  audioInit(); if(AC&&AC.state==="suspended") AC.resume();
  if(TITLE){ TITLE=false; if(!S.mute) chord(NOTE[YEL]); return; }
  if(S.dead){ if(S.deadT>0.6) S=freshState(); return; }      // tap to restart after death
  if(S.view==='gallery'){                                    // gallery view
    if(zoomIdx>=0){                                          // enlarged: save button, else back to grid
      if(hitRect(x,y,L.zoomDownload)){ downloadImage(S.gallery[zoomIdx]); return; }
      zoomIdx=-1; tone(NOTE[INK]*1.2,0.12,"sine",0.35); return;
    }

    S.view='main'; tone(NOTE[INK]*1.2,0.12,"sine",0.35); return;            // tap elsewhere leaves the gallery
  }
  var trashWasArmed = clearArm>0; clearArm=0;                 // any deliberate tap cancels a pending delete
  if(hitCircle(x,y,L.mute.cx,L.mute.cy,L.mute.r*1.3)){ S.mute=!S.mute; if(!S.mute) tone(NOTE[GRN],0.16,"sine",0.4); return; }

  if(hitCircle(x,y,L.galleryView.cx,L.galleryView.cy,L.galleryView.r*1.3)){ S.view='gallery'; zoomIdx=-1; tone(NOTE[INK]*1.2,0.12,"sine",0.35); return; }
  if(hitCircle(x,y,L.clear.cx,L.clear.cy,L.clear.r*1.3)){ clearSave(trashWasArmed); return; }

  for(var k=0;k<L.autos.length;k++){ var ab=L.autos[k]; if(hitRect(x,y,ab)){ buyAutoColor(ab.hex,ab.x+ab.w/2,ab.y+ab.h/2); return; } }

  for(var j=0;j<L.patternSlots.length;j++){ if(hitRect(x,y,L.patternSlots[j])){
      if(j < S.unlockedPatterns){

function hitThermoBottomLeft(x, y) {
  var T = L.thermo;
  if (!T) return false;
  var cxm = T.x + T.w / 2;
  var tubeW = T.w * 0.6;
  var bulbR = tubeW * 0.92;
  var bulbCy = T.y + T.h - bulbR;
  
  var hitW = Math.max(48, bulbR * 2.5);
  var hitH = Math.max(48, bulbR * 2.5);
  
  var leftBound = cxm - hitW * 0.75;
  var rightBound = cxm + T.w * 0.25;
  var topBound = bulbCy - hitH * 0.35;
  var bottomBound = T.y + T.h + hitH * 0.5;

  return (x >= leftBound && x <= rightBound) && (y >= topBound && y <= bottomBound);
}

cv.addEventListener("pointerdown", function(e){

    }
  }

  // Check if hitting the gallery (autosell) button
  var hitGallery = hitCircle(x, y, L.gallery.cx, L.gallery.cy, L.gallery.r * 1.3);

  var hitShapePick = L.shapeAutoPick && hitRect(x, y, L.shapeAutoPick);

  if(hitGallery && S.galleryOwned){
    pressTarget = { type: 'gallery' };

      longPressed = true;

/* ---------- update ---------- */
function update(dt){
  if(clearArm>0){ clearArm-=dt; if(clearArm<0) clearArm=0; }   // auto-cancel the delete confirm
  saveClock+=dt; if(saveDirty && saveClock>=2){ saveClock=0; saveDirty=false; saveGame(); }   // flush a pending save
  if(TITLE) return;
  if(S.dead){ S.deadT+=dt; return; }
  // blood slowly replenishes
  S.blood=Math.min(BLOOD_MAX, S.blood+BLOOD_REGEN*dt);
  if(S.cur) S.cur.flash=Math.max(0,S.cur.flash-dt*3);
  // money gauge rescales upward when it reaches the halfway mark (never down)
  while(S.money >= S.moneyScale/2){ S.moneyScale*=10; S.iconVal*=10; }
  // auto-paint buyers: one per colour, each on its own timer (red pauses on low blood)
  for(var ac=0;ac<COLOR_LIST.length;ac++){ var acol=COLOR_LIST[ac], lvl=S.auto[acol]||0; if(lvl<=0 || S.autoDisabled[acol]) continue;
    S.autoT[acol]=(S.autoT[acol]||0)-dt;
    if(S.autoT[acol]<=0){
      S.autoT[acol]=Math.max(0.32, 1.3/lvl);
      if(curShapes()<AUTO_CAP){
        if(acol===RED){ if(S.blood>BLOOD_COST*1.7) paintDrop(RED,L.well.cx,L.well.cy,true); }
        else if(canSpend(DROP_COST)) paintDrop(acol,L.well.cx,L.well.cy,true);
      }
    }
  }
  // art economy ratchets up at random rates, never down
  S.artTimer-=dt; if(S.artTimer<=0){ S.artMult+=0.02+Math.random()*0.16; S.artTimer=2+Math.random()*4; }
  // flyers -> canvas
  for(var fi=S.flyers.length-1;fi>=0;fi--){ var f=S.flyers[fi]; f.t+=dt/0.55; if(f.t>=1){ commitArt(f); S.flyers.splice(fi,1); } }
  for(var a=0;a<S.art.length;a++){ if(S.art[a].t<1) S.art[a].t=Math.min(1,S.art[a].t+dt*2.6); }
  // auto-sell when a gallery is owned
  if(S.sellCd>0) S.sellCd-=dt;
  if(S.galleryOwned && !S.galleryDisabled && sellable() && S.sellCd<=0 && S.flyers.length===0) doSell();
  // coins / glints / warn
  for(var ci=S.coins.length-1;ci>=0;ci--){ var cn=S.coins[ci]; cn.t+=dt/0.7; if(cn.t>=1) S.coins.splice(ci,1); }
  for(var gi=S.glints.length-1;gi>=0;gi--){ S.glints[gi].t+=dt*1.6; if(S.glints[gi].t>=1) S.glints.splice(gi,1); }
  if(S.warn){ S.warn.t+=dt*1.6; if(S.warn.t>=1) S.warn=null; }
}

var BUILD = (function() {
  var d = new Date(document.lastModified);
  if (isNaN(d.getTime())) d = new Date();
  var yr = d.getFullYear();
  var mo = d.getMonth() + 1;
  mo = mo < 10 ? '0' + mo : mo;
  var dy = d.getDate();
  dy = dy < 10 ? '0' + dy : dy;
  var hr = d.getHours();
  var ap = hr < 12 ? 'AM' : 'PM';
  hr = hr % 12; if (hr === 0) hr = 12;
  var mn = d.getMinutes();

  return yr + "-" + mo + "-" + dy + " " + hr + ":" + mn + " " + ap;
})();
function skull(cx,cy,r,col,hole){
  ctx.fillStyle=col;

  roundRect(cx-r*0.5, cy+r*0.55, r, r*0.7, r*0.22); ctx.fill();        // jaw
  ctx.fillStyle=hole;
  ctx.beginPath(); ctx.arc(cx-r*0.42,cy-r*0.08,r*0.29,0,PI2); ctx.fill();   // eye
  ctx.beginPath(); ctx.arc(cx+r*0.42,cy-r*0.08,r*0.29,0,PI2); ctx.fill();   // eye
  ctx.beginPath(); ctx.moveTo(cx,cy+r*0.06); ctx.lineTo(cx-r*0.14,cy+r*0.34); ctx.lineTo(cx+r*0.14,cy+r*0.34); ctx.closePath(); ctx.fill(); // nose
  ctx.strokeStyle=hole; ctx.lineWidth=Math.max(1.5,r*0.05);
  ctx.beginPath(); ctx.moveTo(cx-r*0.5,cy+r*0.62); ctx.lineTo(cx+r*0.5,cy+r*0.62); ctx.stroke();
  for(var i=-1;i<=1;i++){ var x=cx+i*r*0.3; ctx.beginPath(); ctx.moveTo(x,cy+r*0.62); ctx.lineTo(x,cy+r*1.2); ctx.stroke(); }

function glyphBlocks(lx,y0,cell,cells,bg){

    ctx.fillStyle="#FBF8F1";
    for(i=0;i<cells.length;i++){ cl=cells[i]; ctx.fillRect(lx+cl.c*cell, y0+cl.r*cell, cell+0.5, cell+0.5); }

function bandFill(g,cx,cy,r,mix,frac,pattern){
  var top=cy-r,bot=cy+r;
  var totalH=(bot-top)*frac;

  g.save();
  g.beginPath();
  g.rect(cx - r * 1.4, bot - totalH, r * 2.8, totalH);
  g.clip();

  if(!mix || mix.length === 0){
    g.fillStyle = "rgba(21,18,16,0.05)";
    g.fillRect(cx - r * 1.5, cy - r * 1.5, r * 3.0, r * 3.0);
    g.restore();
    return;
  }

  function addMixColorStops(grad, mix) {
    if (!mix || mix.length === 0) return;
    if (mix.length === 1) {
      grad.addColorStop(0, mix[0].col);
      grad.addColorStop(1, mix[0].col);
      return;
    }
    var accum = 0;
    grad.addColorStop(0, mix[0].col);
    for (var i = 0; i < mix.length; i++) {
      accum += mix[i].share;
      grad.addColorStop(Math.min(1.0, accum), mix[i].col);
    }
  }

  var trans = (pattern && pattern.substring(0, 6) === 'trans_');
  if(trans) {
    g.globalAlpha = 0.55;
    pattern = pattern.substring(6);
  }

  if(pattern === 'circles'){
    var curR = r * 1.3;
    for(var i=0; i<mix.length; i++){
      var ringW = mix[i].share * r * 1.3;
      g.fillStyle = mix[i].col;
      g.beginPath();
      g.arc(cx, cy, curR, 0, PI2);
      g.fill();
      curR -= ringW;
    }
  } else if(pattern === 'wavy'){
    var cumulativeShares = [0];
    var accum = 0;
    for(var i=0; i<mix.length; i++){
      accum += mix[i].share;
      cumulativeShares.push(accum);
    }
    var amp = r * 0.15;
    var freq = 2.5 / r;
    var startX = cx - r * 1.4;
    var endX = cx + r * 1.4;

    for(var i=0; i<mix.length; i++){
      g.fillStyle = mix[i].col;
      g.beginPath();

      var x;
      for(x = startX; x <= endX + 1; x += r * 0.1){
        var y_bot = bot - (bot - top) * cumulativeShares[i] + amp * Math.sin(freq * (x - cx));
        if(x === startX) g.moveTo(startX, y_bot);
        else g.lineTo(x, y_bot);
      }
      for(x = endX; x >= startX - 1; x -= r * 0.1){
        var y_top = bot - (bot - top) * cumulativeShares[i+1] + amp * Math.sin(freq * (x - cx));
        g.lineTo(x, y_top);
      }
      g.closePath();
      g.fill();
    }
  } else if(pattern === 'vertical'){
    var totalW = r * 2.8;
    var x0 = cx - r * 1.4;
    for(var i=0; i<mix.length; i++){
      var band = mix[i].share * totalW;
      g.fillStyle = mix[i].col;
      g.fillRect(x0, cy - r * 1.4, band + 0.7, r * 2.8);
      x0 += band;
    }
  } else if(pattern === 'grid'){
    var y0=bot;
    for(var i=0;i<mix.length;i++){
      var band=mix[i].share*(bot-top);
      g.fillStyle=mix[i].col;
      g.fillRect(cx-r*1.35,y0-band,r*2.7,band+0.7);
      y0-=band;
    }
    g.globalAlpha = (g.globalAlpha || 1) * 0.55;
    var totalW = r * 2.8;
    var x0 = cx - r * 1.4;
    for(var i=mix.length-1; i>=0; i--){
      var band = mix[i].share * totalW;
      g.fillStyle = mix[i].col;
      g.fillRect(x0, cy - r * 1.4, band + 0.7, r * 2.8);
      x0 += band;
    }
  } else if(pattern === 'checkered'){
    var size = r * 0.45;
    for(var x = cx - r * 1.5; x < cx + r * 1.5; x += size){
      for(var y = cy - r * 1.5; y < cy + r * 1.5; y += size){
        var idx = Math.abs(Math.floor((x - cx) / size) + Math.floor((y - cy) / size)) % mix.length;
        g.fillStyle = mix[idx].col;
        g.fillRect(x, y, size + 0.6, size + 0.6);
      }
    }
  } else if(pattern === 'dots'){
    g.fillStyle = mix[0].col;
    g.fillRect(cx - r * 1.5, cy - r * 1.5, r * 3.0, r * 3.0);
    var dotR = r * 0.2;
    var dotSpacing = r * 0.5;
    var idx = 1;
    for(var x = cx - r * 1.35; x < cx + r * 1.35; x += dotSpacing){
      for(var y = cy - r * 1.35; y < cy + r * 1.35; y += dotSpacing){
        g.fillStyle = mix[idx % mix.length].col;
        g.beginPath();
        g.arc(x, y, dotR, 0, PI2);
        g.fill();
        idx++;
      }
    }
  } else if(pattern === 'radial'){
    var startAngle = 0;
    for(var i=0; i<mix.length; i++){
      var angle = mix[i].share * PI2;
      g.fillStyle = mix[i].col;
      g.beginPath();
      g.moveTo(cx, cy);
      g.arc(cx, cy, r * 1.5, startAngle, startAngle + angle);
      g.closePath();
      g.fill();
      startAngle += angle;
    }
  } else if(pattern === 'zigzag'){
    var cumulativeShares = [0];
    var accum = 0;
    for(var i=0; i<mix.length; i++){
      accum += mix[i].share;
      cumulativeShares.push(accum);
    }
    var amp = r * 0.16;
    var period = r * 0.8;
    var startX = cx - r * 1.4;
    var endX = cx + r * 1.4;

    for(var i=0; i<mix.length; i++){
      g.fillStyle = mix[i].col;
      g.beginPath();

      var x;
      for(x = startX; x <= endX + 1; x += r * 0.1){
        var triVal = Math.abs(((x - cx + r * 2) % period) - period / 2) * 4 / period - 1;
        var y_bot = bot - (bot - top) * cumulativeShares[i] + amp * triVal;
        if(x === startX) g.moveTo(startX, y_bot);
        else g.lineTo(x, y_bot);
      }
      for(x = endX; x >= startX - 1; x -= r * 0.1){
        var triVal = Math.abs(((x - cx + r * 2) % period) - period / 2) * 4 / period - 1;
        var y_top = bot - (bot - top) * cumulativeShares[i+1] + amp * triVal;
        g.lineTo(x, y_top);
      }
      g.closePath();
      g.fill();
    }
  } else if(pattern === 'grad_linear'){
    var grad = g.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
    addMixColorStops(grad, mix);
    g.fillStyle = grad;
    g.fillRect(cx - r * 1.5, cy - r * 1.5, r * 3.0, r * 3.0);
  } else if(pattern === 'grad_radial'){
    var grad = g.createRadialGradient(cx, cy, 0, cx, cy, r * 1.25);
    addMixColorStops(grad, mix);
    g.fillStyle = grad;
    g.fillRect(cx - r * 1.5, cy - r * 1.5, r * 3.0, r * 3.0);
  } else if(pattern === 'grad_conic'){
    if (g.createConicGradient) {
      var grad = g.createConicGradient(0, cx, cy);
      addMixColorStops(grad, mix);
      g.fillStyle = grad;
    } else {
      var grad = g.createLinearGradient(cx - r, cy, cx + r, cy);
      addMixColorStops(grad, mix);
      g.fillStyle = grad;
    }
    g.fillRect(cx - r * 1.5, cy - r * 1.5, r * 3.0, r * 3.0);
  } else if(pattern === 'grad_stripes'){
    var cumulativeShares = [0];
    var accum = 0;
    for(var i=0; i<mix.length; i++){
      accum += mix[i].share;
      cumulativeShares.push(accum);
    }
    for(var i=0; i<mix.length; i++){
      var y_bot = bot - totalH * cumulativeShares[i];
      var y_top = bot - totalH * cumulativeShares[i+1];
      var grad = g.createLinearGradient(cx, y_bot, cx, y_top);
      grad.addColorStop(0, mix[i].col);
      grad.addColorStop(1, "rgba(21,18,16,0.1)");
      g.fillStyle = grad;
      g.fillRect(cx - r * 1.4, y_top, r * 2.8, y_bot - y_top + 0.7);
    }
  } else if(pattern === 'grad_waves'){
    var cumulativeShares = [0];
    var accum = 0;
    for(var i=0; i<mix.length; i++){
      accum += mix[i].share;
      cumulativeShares.push(accum);
    }
    var amp = r * 0.15;
    var freq = 2.5 / r;
    var startX = cx - r * 1.4;
    var endX = cx + r * 1.4;

    for(var i=0; i<mix.length; i++){
      var y_bot_ref = bot - (bot - top) * cumulativeShares[i];
      var y_top_ref = bot - (bot - top) * cumulativeShares[i+1];
      var grad = g.createLinearGradient(cx, y_bot_ref, cx, y_top_ref);
      grad.addColorStop(0, mix[i].col);
      grad.addColorStop(1, "rgba(255,255,255,0.4)");
      g.fillStyle = grad;
      g.beginPath();

      var x;
      for(x = startX; x <= endX + 1; x += r * 0.1){
        var y_bot = bot - (bot - top) * cumulativeShares[i] + amp * Math.sin(freq * (x - cx));
        if(x === startX) g.moveTo(startX, y_bot);
        else g.lineTo(x, y_bot);
      }
      for(x = endX; x >= startX - 1; x -= r * 0.1){
        var y_top = bot - (bot - top) * cumulativeShares[i+1] + amp * Math.sin(freq * (x - cx));
        g.lineTo(x, y_top);

    }
  } else if(pattern === 'grad_rings'){
    var grad = g.createRadialGradient(cx, cy, 0, cx, cy, r * 1.25);
    var accum = 0;
    grad.addColorStop(0, mix[0].col);
    for (var i = 0; i < mix.length; i++) {
      accum += mix[i].share;
      grad.addColorStop(Math.min(1.0, accum), mix[i].col);
      if (i < mix.length - 1) {
        grad.addColorStop(Math.min(1.0, accum + 0.05), mix[i+1].col);

    g.fillRect(cx - r * 1.5, cy - r * 1.5, r * 3.0, r * 3.0);

    addMixColorStops(grad, mix);
    g.fillStyle = grad;
    g.fillRect(cx - r * 1.5, cy - r * 1.5, r * 3.0, r * 3.0);
  } else if(pattern === 'grad_glow'){
    var grad = g.createRadialGradient(cx, cy, r * 0.1, cx, cy, r * 1.2);
    grad.addColorStop(0, mix[0].col);
    grad.addColorStop(0.5, mix[mix.length - 1].col);
    grad.addColorStop(1, "rgba(255,255,255,0.0)");
    g.fillStyle = grad;
    g.fillRect(cx - r * 1.5, cy - r * 1.5, r * 3.0, r * 3.0);
  } else if(pattern === 'grad_rainbow'){
    var grad = g.createLinearGradient(cx - r * 1.2, cy, cx + r * 1.2, cy);
    addMixColorStops(grad, mix);
    g.fillStyle = grad;
    g.fillRect(cx - r * 1.5, cy - r * 1.5, r * 3.0, r * 3.0);
  } else if(pattern && pattern.charAt(0) === 'p') {
    var pIdx = parseInt(pattern.substring(1), 10);

      for (var x = cx - r * 1.35; x < cx + r * 1.35; x += r * 0.45) {

      }
      g.stroke();
    }
  } else {
    var y0=bot;
    for(var i=0;i<mix.length;i++){
      var band=mix[i].share*(bot-top);
      g.fillStyle=mix[i].col;
      g.fillRect(cx-r*1.35,y0-band,r*2.7,band+0.7);
      y0-=band;
    }
  }
  g.restore();
}

function galleryIcon(cx,cy,r,col){
  ctx.save();
  ctx.fillStyle=col;
  ctx.strokeStyle=col;
  ctx.lineWidth=Math.max(1.5, r*0.09);
  ctx.lineJoin="round";
  ctx.lineCap="round";

  var rx = cx - r * 0.15; // horizontal center of the robot

  // --- Robot Head ---
  var hw = r * 0.65;
  var hh = r * 0.5;
  var hx = rx - hw / 2;
  var hy = cy - r * 0.7;
  ctx.strokeRect(hx, hy, hw, hh);

  // Antenna
  ctx.beginPath();
  ctx.moveTo(rx, hy);
  ctx.lineTo(rx, hy - r * 0.25);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(rx, hy - r * 0.25, r * 0.08, 0, PI2);
  ctx.fill();

  // Stupid Eyes (googly/crooked dots)
  var eyeR = r * 0.07;
  ctx.beginPath();
  ctx.arc(hx + hw * 0.3, hy + hh * 0.4, eyeR, 0, PI2);
  ctx.arc(hx + hw * 0.7, hy + hh * 0.55, eyeR, 0, PI2);
  ctx.fill();

  // Crooked Mouth
  ctx.beginPath();
  ctx.moveTo(hx + hw * 0.25, hy + hh * 0.78);
  ctx.lineTo(hx + hw * 0.75, hy + hh * 0.73);
  ctx.stroke();

  // Neck
  ctx.beginPath();
  ctx.moveTo(rx - r * 0.08, hy + hh);
  ctx.lineTo(rx - r * 0.08, cy - r * 0.1);
  ctx.moveTo(rx + r * 0.08, hy + hh);
  ctx.lineTo(rx + r * 0.08, cy - r * 0.1);
  ctx.stroke();

  // --- Robot Body ---
  var bw = r * 0.8;
  var bh = r * 0.55;
  var bx = rx - bw / 2;
  var by = cy - r * 0.1;
  ctx.strokeRect(bx, by, bw, bh);

  // Dial on chest
  ctx.beginPath();
  ctx.arc(rx, by + bh * 0.5, r * 0.11, 0, PI2);
  ctx.stroke();

  // --- Arms ---
  // Left arm (up/waving)
  ctx.beginPath();
  ctx.moveTo(bx, by + bh * 0.25);
  ctx.lineTo(bx - r * 0.3, by - r * 0.1);
  ctx.stroke();

  // Right arm (stick arm holding bag)
  var mx = bx + bw + r * 0.25;
  var my = by + bh * 0.35;
  ctx.beginPath();
  ctx.moveTo(bx + bw, by + bh * 0.3);
  ctx.lineTo(mx, my);
  ctx.stroke();

  // --- Stupid Moneybag ---
  var brad = r * 0.26;
  // Bag body
  ctx.beginPath();
  ctx.arc(mx, my + brad * 0.45, brad, 0, PI2);
  ctx.fill();
  // Bag neck (crumpled top of bag)
  ctx.beginPath();
  ctx.moveTo(mx, my - brad * 0.1);
  ctx.lineTo(mx - brad * 0.55, my - brad * 0.7);
  ctx.lineTo(mx + brad * 0.55, my - brad * 0.7);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

  else { ctx.strokeStyle=INK; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(m.r*0.35,0,m.r*0.4,-0.7,0.7); ctx.stroke(); ctx.beginPath(); ctx.arc(m.r*0.35,0,m.r*0.65,-0.7,0.7); ctx.stroke(); } ctx.restore(); }

function drawWarn(){ if(!S.warn) return; var w=S.warn, r=14+w.t*16, a=1-w.t;
  ctx.strokeStyle=RED; ctx.globalAlpha=a; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(w.x,w.y,r,0,PI2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w.x-r*0.6,w.y-r*0.6); ctx.lineTo(w.x+r*0.6,w.y+r*0.6); ctx.stroke(); ctx.globalAlpha=1; }

/* ---------- loop ---------- */
var last=0;
function frame(ts){ var dt=Math.min(0.05,(ts-last)/1000||0); last=ts; time+=dt; update(dt); draw(); requestAnimationFrame(frame); }

/* ---------- boot ---------- */
S=loadGame()||freshState(); resize(); requestAnimationFrame(frame);
// also flush a save when the tab is hidden or closed, so nothing is lost between ticks
function flushSave(){ if(!TITLE){ saveDirty=false; saveClock=0; saveGame(); } }
window.addEventListener('pagehide', flushSave);
document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') flushSave(); });
})();
</script>
</body>
</html>
